<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyball Team Finder</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <a href="https://flyballhub.com" target="_blank" rel="noopener" class="logo-link">
        <img src="logo.png" alt="Flyball Hub" class="logo">
      </a>
      <h1 class="title">Flyball Team Finder</h1>
    </header>

    <main class="main">
      <div class="search-section">
        <button id="locationBtn" class="btn btn-primary">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2v3m0 14v3M2 12h3m14 0h3"/>
          </svg>
          Use my location
        </button>

        <div class="divider">
          <span>or</span>
        </div>

        <div class="search-input-group">
          <input type="text" id="searchInput" placeholder="Enter postcode or city..." class="search-input">
          <button id="searchBtn" class="btn btn-secondary">Search</button>
        </div>
      </div>

      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>Finding teams near you...</p>
      </div>

      <div id="error" class="error hidden"></div>

      <div id="results" class="results hidden">
        <h2 class="results-title">Nearby Teams</h2>
        <div id="teamsList" class="teams-list"></div>
        <a href="https://flyballhub.com/team-finder" target="_blank" rel="noopener" class="btn btn-outline view-all">
          View all teams on Flyball Hub →
        </a>
      </div>
    </main>

    <footer class="footer">
      <a href="https://flyballhub.com" target="_blank" rel="noopener">
        Powered by <strong>Flyball Hub</strong>
      </a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
